name: CI/CD Pipeline for Node.js App
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      # Checkout repository
      - uses: actions/checkout@v3


      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'


      # Install dependencies
      - name: Install dependencies
        run: npm install


      # Run Snyk vulnerability scan
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high


      # Build the application
      - name: Build
        run: npm run build


      # Deploy to Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }} # Add in GitHub Secrets
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }} # Add in GitHub Secrets
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }} # Add in GitHub Secrets
          working-directory: ./
          vercel-args: ‘--prod’
